name: update-dependency-version

# Receives repository_dispatch from unified-trading-pm after a dependency's version-bump.
# UI repos use package.json instead of pyproject.toml.
#
# SSOT: unified-trading-pm/scripts/workflow-templates/update-dependency-version.yml
# Rollout: bash unified-trading-pm/scripts/workflow-templates/rollout-workflow-templates.sh

on:
  repository_dispatch:
    types: [dependency-update]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          ref: staging

      - name: Update dependency
        id: update
        run: |
          set -euo pipefail
          DEP_NAME="${{ github.event.client_payload.dep_name }}"
          DEP_VERSION="${{ github.event.client_payload.dep_version }}"
          BUMP_TYPE="${{ github.event.client_payload.bump_type }}"
          BUMP_TYPE="${BUMP_TYPE:-patch}"

          if [ -z "$DEP_NAME" ] || [ -z "$DEP_VERSION" ]; then
            echo "Missing dep_name or dep_version. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! grep -q "\"${DEP_NAME}" package.json; then
            echo "$DEP_NAME not found in package.json -- skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "dep_name=$DEP_NAME" >> "$GITHUB_OUTPUT"
          echo "dep_version=$DEP_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Commit (MINOR/PATCH -- direct to staging)
        if: steps.update.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet package.json; then
            echo "No changes. Skipping."
            exit 0
          fi
          git add package.json
          git commit -m "chore(deps): update ${{ steps.update.outputs.dep_name }} to ${{ steps.update.outputs.dep_version }} [skip ci]"
          git push origin staging

  notify-failure:
    name: Telegram — Dep Update Failure
    needs: [update-dep]
    if: always() && needs.update-dep.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram failure alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TELEGRAM_BOT_TOKEN" ] && exit 0
          [ -z "$TELEGRAM_CHAT_ID" ] && exit 0
          MSG="Dep update FAILED — user-management-ui (${{ github.event.client_payload.dep_name }})"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" -d "text=${MSG}" || true
