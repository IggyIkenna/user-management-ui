name: Deploy to GCP

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: true
        type: choice
        options:
          - all
          - api-only
          - ui-only
        default: all
      region:
        description: "Cloud Run region (API)"
        required: false
        default: us-central1

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT: central-element-323112
  API_SERVICE: user-management-api
  API_PORT: "8017"

jobs:
  deploy-api:
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'api-only' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy ${{ env.API_SERVICE }} \
            --source . \
            --region ${{ github.event.inputs.region }} \
            --port ${{ env.API_PORT }} \
            --allow-unauthenticated \
            --project ${{ env.GCP_PROJECT }}

      - name: Verify API health
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.API_SERVICE }} \
            --region ${{ github.event.inputs.region }} \
            --project ${{ env.GCP_PROJECT }} \
            --format 'value(status.url)')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/health")
          echo "Health check: ${SERVICE_URL}/health -> ${STATUS}"
          [ "$STATUS" = "200" ] || { echo "Health check failed"; exit 1; }

  deploy-ui:
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'ui-only' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy UI via Firebase App Hosting
        run: |
          firebase deploy --only apphosting:odum-user-mgmt-admin \
            --project ${{ env.GCP_PROJECT }}

  notify:
    if: always()
    needs: [deploy-api, deploy-ui]
    runs-on: ubuntu-latest

    steps:
      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          API_RESULT: ${{ needs.deploy-api.result }}
          UI_RESULT: ${{ needs.deploy-ui.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TARGET="${{ github.event.inputs.target }}"
          FAILED=false
          [ "$API_RESULT" = "failure" ] && FAILED=true
          [ "$UI_RESULT" = "failure" ] && FAILED=true
          ICON=$( [ "$FAILED" = "true" ] && echo "❌" || echo "✅" )
          TEXT="${ICON} *Deploy user-management-ui* (${TARGET})"
          TEXT="${TEXT}"$'\n'"API: ${API_RESULT:-skipped} | UI: ${UI_RESULT:-skipped}"
          TEXT="${TEXT}"$'\n'"Branch: \`${{ github.ref_name }}\` | By: ${{ github.actor }}"
          TEXT="${TEXT}"$'\n'"[view run](${RUN_URL})"
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="${TEXT}" \
              -d parse_mode="Markdown" || true
          fi
