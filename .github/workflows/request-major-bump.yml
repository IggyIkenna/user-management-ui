name: request-major-bump

on:
  workflow_dispatch:
    inputs:
      proposed_version:
        description: "New MAJOR version (e.g. 1.0.0 or 2.0.0)"
        required: true
        type: string
      reason:
        description: "Why this is a MAJOR bump"
        required: true
        type: string
      approver:
        description: "GitHub handle of requester (defaults to actor)"
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  request-major-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Validate version and read current
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          PROPOSED="${{ inputs.proposed_version }}"
          REQUESTER="${{ inputs.approver || github.actor }}"
          REPO_NAME="${{ github.event.repository.name }}"

          if ! echo "$PROPOSED" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: version must be MAJOR.MINOR.PATCH format"
            exit 1
          fi

          PROPOSED_MAJOR=$(echo "$PROPOSED" | cut -d. -f1)
          if [ "$PROPOSED_MAJOR" -lt 1 ]; then
            echo "ERROR: proposed_version must have MAJOR >= 1"
            exit 1
          fi

          CURRENT=$(node -p "require('./package.json').version" 2>/dev/null || echo "0.0.0")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "proposed=$PROPOSED" >> "$GITHUB_OUTPUT"
          echo "requester=$REQUESTER" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Issue for approval
        id: create-issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_ORG: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          CURRENT="${{ steps.validate.outputs.current }}"
          PROPOSED="${{ steps.validate.outputs.proposed }}"
          REQUESTER="${{ steps.validate.outputs.requester }}"
          REPO="${{ steps.validate.outputs.repo }}"
          REASON="${{ inputs.reason }}"
          COMMIT_SHA="${{ github.sha }}"

          METADATA_JSON="{\"repo\":\"${REPO}\",\"proposed_version\":\"${PROPOSED}\",\"current_version\":\"${CURRENT}\",\"staging_branch\":\"staging\",\"staging_commit\":\"${COMMIT_SHA}\",\"reason\":\"${REASON}\"}"

          ISSUE_BODY="## Major Version Bump Approval Required

          Repo: ${REPO}
          Current version: ${CURRENT}
          Proposed version: ${PROPOSED}
          Reason: ${REASON}
          Requested by: @${REQUESTER}

          ---

          Comment /approve to approve. Comment /reject to reject.

          <!-- major-bump-metadata
          ${METADATA_JSON}
          -->"

          ISSUE_URL=$(gh issue create \
            --repo "${GH_ORG}/${REPO}" \
            --title "[MAJOR BUMP PENDING] ${REPO}: ${CURRENT} to ${PROPOSED}" \
            --body "$ISSUE_BODY" \
            --label "major-bump-pending" \
            2>&1 || echo "")

          if [ -z "$ISSUE_URL" ] || ! echo "$ISSUE_URL" | grep -q "http"; then
            ISSUE_URL=$(gh issue create \
              --repo "${GH_ORG}/${REPO}" \
              --title "[MAJOR BUMP PENDING] ${REPO}: ${CURRENT} to ${PROPOSED}" \
              --body "$ISSUE_BODY" \
              2>&1 || echo "")
          fi

          if [ -z "$ISSUE_URL" ] || ! echo "$ISSUE_URL" | grep -q "http"; then
            echo "::error::Failed to create GitHub issue"
            exit 1
          fi

          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"

      - name: Send Telegram alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TELEGRAM_BOT_TOKEN" ] && exit 0
          [ -z "$TELEGRAM_CHAT_ID" ] && exit 0
          MSG="MAJOR BUMP REQUESTED -- user-management-ui -- ${{ steps.validate.outputs.current }} to ${{ steps.validate.outputs.proposed }} -- Approve: ${{ steps.create-issue.outputs.issue_url }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" -d "text=${MSG}" -d "disable_web_page_preview=true" || true
