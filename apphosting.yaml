# App Hosting runtime overrides for Next.js + Express sidecar API.
runConfig:
  memoryMiB: 1024

env:
  - variable: USER_MGMT_API_URL
    value: https://user-management-api-cldtjniqvq-uc.a.run.app
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_API_KEY
    secret: FIREBASE_API_KEY
    availability:
      - RUNTIME

  - variable: SECRET_REF_GITHUB_ADMIN_PAT
    secret: github-automation-token
    availability:
      - RUNTIME
