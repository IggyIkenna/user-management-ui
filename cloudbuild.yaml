# Cloud Build Template — Unified Trading System UI Repos
#
# UI variant: quality-gates FIRST (node), then configure-docker, ensure-repo, build, push, scan-check.
# No pull-base-image. Runtime image is lean nginx.
#
# Why QG runs before docker build: nginx:alpine runtime has no node/npm.
# Running QG in node:20-alpine build env is correct separation of concerns.
#
# Generated from PM template. Placeholders: user-management-ui, unified-trading-system.

substitutions:
  _SERVICE_NAME: "user-management-ui"
  _REGISTRY_REPO: "unified-trading-system"

steps:
  # ── Auth pre-check: fail fast if SA lacks Docker AR access ─
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:alpine"
    id: "auth-precheck"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -e
        gcloud auth print-access-token >/dev/null || { echo "FAIL: No GCP token"; exit 1; }
        gcloud artifacts repositories describe unified-trading-system --location=asia-northeast1 --quiet || \
          gcloud artifacts repositories create unified-trading-system --repository-format=docker --location=asia-northeast1 --description="Docker images" 2>/dev/null || true
        echo "Auth pre-check passed"
    waitFor: ["-"]

  - name: "node:20-alpine"

    id: "quality-gates"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        set -e
        npm ci --prefer-offline 2>/dev/null || npm ci
        echo "--- Typecheck ---"
        npm run typecheck 2>/dev/null || npm run type-check
        echo "--- Lint ---"
        npm run lint
        echo "--- Unit tests ---"
        npm test
        echo "=== Quality gates passed ==="
    waitFor: ["-"]

  - name: "gcr.io/cloud-builders/gcloud"
    id: "configure-docker"
    args:
      ["auth", "configure-docker", "asia-northeast1-docker.pkg.dev", "--quiet"]
    waitFor: ["-"]

  - name: "gcr.io/cloud-builders/gcloud"
    id: "ensure-repo"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud artifacts repositories describe ${_REGISTRY_REPO} \
          --location=asia-northeast1 &>/dev/null || \
        gcloud artifacts repositories create ${_REGISTRY_REPO} \
          --repository-format=docker \
          --location=asia-northeast1 \
          --description="${_SERVICE_NAME} Docker images"
        gcloud artifacts repositories update ${_REGISTRY_REPO} \
          --location=asia-northeast1 \
          --enable-vulnerability-scanning 2>/dev/null || true
    waitFor: ["-"]

  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    args:
      - "build"
      - "-f"
      - "Dockerfile"
      - "-t"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/${_REGISTRY_REPO}/${_SERVICE_NAME}:$SHORT_SHA"
      - "-t"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/${_REGISTRY_REPO}/${_SERVICE_NAME}:latest"
      - "."
    waitFor: ["quality-gates", "ensure-repo", "configure-docker"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push"
    args:
      [
        "push",
        "--all-tags",
        "asia-northeast1-docker.pkg.dev/$PROJECT_ID/${_REGISTRY_REPO}/${_SERVICE_NAME}",
      ]
    waitFor: ["build"]

  - name: "gcr.io/cloud-builders/gcloud"
    id: "scan-check"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        IMAGE="asia-northeast1-docker.pkg.dev/$PROJECT_ID/${_REGISTRY_REPO}/${_SERVICE_NAME}:$SHORT_SHA"
        echo "Waiting for Container Analysis vulnerability scan on $$IMAGE..."
        for i in $(seq 1 18); do
          RESULT=$(gcloud artifacts docker images describe "$$IMAGE" \
            --show-package-vulnerability --format="json" 2>/dev/null)
          if [ -n "$$RESULT" ]; then
            CRITICAL=$(echo "$$RESULT" | python3 -c "import json,sys;d=json.load(sys.stdin);print(len(d.get('package_vulnerability_summary',{}).get('vulnerabilities',{}).get('CRITICAL',[])))" 2>/dev/null || echo "0")
            if [ "$$CRITICAL" != "0" ]; then
              echo "SCAN FAILED: $$CRITICAL CRITICAL CVEs found in $$IMAGE"
              exit 1
            fi
            echo "Scan complete: 0 CRITICAL CVEs"
            exit 0
          fi
          echo "Scan not ready (attempt $$i/18) — waiting 10s..."
          sleep 10
        done
        echo "WARNING: Vulnerability scan timed out — proceeding"
        exit 0
    waitFor: ["push"]

images:
  - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/${_REGISTRY_REPO}/${_SERVICE_NAME}:$SHORT_SHA"
  - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/${_REGISTRY_REPO}/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

timeout: "600s"
