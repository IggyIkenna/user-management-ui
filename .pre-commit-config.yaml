# Canonical pre-commit config for TypeScript/React UI repos.
# Template SSOT: unified-trading-pm/scripts/pre-commit-templates/
# Rollout: bash unified-trading-pm/scripts/propagation/rollout-pre-commit-configs.sh
# Setup: pre-commit install --install-hooks

default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # Conventional commit validation (feat:/fix:/chore:/docs:/refactor:/test:/ci:)
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # Prettier - TypeScript/JSON/CSS formatter
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: Format with Prettier
        types_or: [javascript, jsx, ts, tsx, json, css, markdown, yaml]
        additional_dependencies:
          - prettier@3.6.2

  # ESLint - TypeScript/React linter
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        name: Lint with ESLint
        types_or: [javascript, jsx, ts, tsx]

  # Branch drift check - blocks commit if you're behind origin
  - repo: local
    hooks:
      - id: check-branch-drift
        name: Check branch drift (are you behind origin?)
        entry: bash -c 'HOOK="${WORKSPACE_ROOT:-$(cd "$(git rev-parse --show-toplevel)/.." && pwd)}/unified-trading-pm/scripts/hooks/check-branch-drift.sh"; [ -f "$HOOK" ] && bash "$HOOK" || exit 0'
        language: system
        always_run: true
        pass_filenames: false

  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
